<!-- Toss Style: Pretendard (Toss-flavored Korean font) -->
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">

<style>
  :root {
    /* Toss official color tokens */
    --tg-900: #191F28;
    --tg-800: #333D4B;
    --tg-700: #4E5968;
    --tg-600: #6B7684;
    --tg-500: #8B95A1;
    --tg-400: #B0B8C1;
    --tg-300: #D1D6DB;
    --tg-200: #E5E8EB;
    --tg-100: #F2F4F6;
    --tg-50:  #F9FAFB;
    --tg-white: #FFFFFF;
    --tg-blue: #3182F6;
    --tg-blue-bg: #EAF2FE;

    /* Aliases used elsewhere for compatibility */
    --blue: #3182F6;
    --blue-light: #EAF2FE;
    --blue-mid: #4593FC;
    --gray-50:  #F9FAFB;
    --gray-100: #F2F4F6;
    --gray-200: #E5E8EB;
    --gray-300: #D1D6DB;
    --gray-400: #B0B8C1;
    --gray-500: #8B95A1;
    --gray-600: #6B7684;
    --gray-700: #4E5968;
    --gray-800: #333D4B;
    --gray-900: #191F28;
    --white: #FFFFFF;

    --radius: 16px;
    --radius-md: 14px;
    --radius-sm: 10px;
    --radius-xs: 8px;
  }

  /* Pretendard 전역 적용 */
  html, body, input, button, textarea, select {
    font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont,
                 system-ui, Roboto, 'Helvetica Neue', 'Segoe UI', 'Apple SD Gothic Neo',
                 'Noto Sans KR', sans-serif !important;
  }

  /* 배경: 토스 메인은 순백 */
  body {
    background-color: var(--tg-white) !important;
    color: var(--tg-900) !important;
  }
</style>
